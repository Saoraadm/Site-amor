<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Nosso Amor">
<title>Nosso Amor</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #07000f;
  color: #fff;
  min-height: 100vh;
  overflow: hidden;
  position: relative;
}

canvas#bg {
  position: fixed;
  inset: 0;
  width: 100%; height: 100%;
  z-index: 0;
}

canvas#hearts {
  position: fixed;
  inset: 0;
  width: 100%; height: 100%;
  z-index: 2;
  pointer-events: none;
}

.elogio-popup {
  position: fixed;
  z-index: 999;
  pointer-events: none;
  text-align: center;
  animation: elogio-anim 2.6s cubic-bezier(.2,.8,.3,1) forwards;
  max-width: 240px;
}
.elogio-inner {
  background: rgba(20,0,35,0.88);
  border: 1px solid rgba(244,63,142,0.35);
  border-radius: 16px;
  padding: 0.65rem 1.1rem;
  backdrop-filter: blur(12px);
  box-shadow: 0 0 24px rgba(244,63,142,0.2);
}
.elogio-emoji { font-size: 1.4rem; display: block; margin-bottom: 3px; }
.elogio-text  { font-size: 13px; color: #fce7f3; line-height: 1.5; font-style: italic; }

@keyframes elogio-anim {
  0%   { opacity:0;  transform:translateY(0px) scale(0.8); }
  12%  { opacity:1;  transform:translateY(-12px) scale(1.03); }
  70%  { opacity:1;  transform:translateY(-28px) scale(1); }
  100% { opacity:0;  transform:translateY(-55px) scale(0.95); }
}

.page {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 3rem 1.5rem 4rem;
  gap: 2rem;
  pointer-events: none;
}

.page > * { pointer-events: auto; }

.eyebrow {
  font-size: 11px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.3);
}

.orb-scene {
  position: relative;
  width: 220px; height: 220px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

.trail {
  position: absolute;
  border-radius: 50%;
  border: 1px solid transparent;
  animation: orbit linear infinite;
}
.trail:nth-child(1) { width:220px;height:220px;border-color:rgba(244,63,142,0.15);animation-duration:22s; }
.trail:nth-child(2) { width:180px;height:180px;border-color:rgba(139,92,246,0.18);animation-duration:15s;animation-direction:reverse; }
.trail:nth-child(3) { width:140px;height:140px;border-color:rgba(244,63,142,0.1);animation-duration:10s; }

.trail::after {
  content:''; position:absolute;
  top:-3px; left:50%; transform:translateX(-50%);
  width:6px; height:6px; border-radius:50%;
  background:#f43f8e; box-shadow:0 0 10px 3px rgba(244,63,142,0.6);
}
.trail:nth-child(2)::after { background:#8b5cf6; box-shadow:0 0 10px 3px rgba(139,92,246,0.6); }
.trail:nth-child(3)::after { width:5px;height:5px; }

@keyframes orbit { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

.orb {
  width:108px; height:108px; border-radius:50%;
  background: conic-gradient(from 180deg,#f43f8e,#8b5cf6,#3b82f6,#8b5cf6,#f43f8e);
  display:flex; align-items:center; justify-content:center;
  font-size:2.6rem; cursor:pointer;
  position:relative; z-index:2;
  animation:orb-breathe 5s ease-in-out infinite;
  box-shadow:0 0 0 1px rgba(255,255,255,0.08),0 0 30px rgba(244,63,142,0.4),0 0 80px rgba(139,92,246,0.25);
  transition:transform 0.12s;
}
.orb::before {
  content:''; position:absolute; inset:3px; border-radius:50%;
  background:radial-gradient(circle at 38% 32%,rgba(255,255,255,0.28),transparent 55%);
  pointer-events:none;
}
.orb:active { transform:scale(0.91); }

@keyframes orb-breathe {
  0%,100% { box-shadow:0 0 0 1px rgba(255,255,255,0.08),0 0 30px rgba(244,63,142,0.35),0 0 80px rgba(139,92,246,0.2); }
  50%      { box-shadow:0 0 0 1px rgba(255,255,255,0.1),0 0 55px rgba(244,63,142,0.6),0 0 130px rgba(139,92,246,0.35); }
}

.count-block { text-align:center; }
.count-num {
  font-size:7rem; font-weight:800; line-height:0.95;
  background:linear-gradient(135deg,#fce7f3 0%,#f9a8d4 30%,#c084fc 65%,#818cf8 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  filter:drop-shadow(0 0 18px rgba(244,63,142,0.45)); display:block;
}
.count-unit {
  font-size:14px; color:rgba(255,255,255,0.4);
  letter-spacing:0.1em; text-transform:uppercase; margin-top:0.4rem;
}

.stats {
  display:grid; grid-template-columns:repeat(3,1fr);
  gap:10px; width:100%; max-width:360px;
}
.stat {
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:18px; padding:1.1rem 0.5rem;
  text-align:center; position:relative; overflow:hidden;
}
.stat::before {
  content:''; position:absolute; top:0; left:50%; transform:translateX(-50%);
  width:50%; height:1px;
  background:linear-gradient(90deg,transparent,rgba(244,63,142,0.5),transparent);
}
.stat-num {
  font-size:1.6rem; font-weight:700;
  background:linear-gradient(135deg,#f9a8d4,#c084fc);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.stat-lbl { font-size:10px; color:rgba(255,255,255,0.3); text-transform:uppercase; letter-spacing:0.1em; margin-top:5px; }

.since { font-size:12px; color:rgba(255,255,255,0.22); letter-spacing:0.07em; text-align:center; }

.aniv {
  width:100%; max-width:360px; text-align:center;
  font-size:13px; padding:0.75rem 1.5rem;
  border-radius:50px; border:1px solid rgba(255,255,255,0.07);
  background:rgba(255,255,255,0.04); color:rgba(255,255,255,0.38);
}
.aniv.hoje {
  border-color:rgba(252,211,77,0.35); background:rgba(252,211,77,0.08);
  color:#fde68a; animation:aniv-glow 2.5s ease-in-out infinite;
}
@keyframes aniv-glow {
  0%,100% { box-shadow:0 0 0 0 rgba(252,211,77,0.2); }
  50%      { box-shadow:0 0 14px 4px rgba(252,211,77,0.15); }
}

.divider {
  width:100%; max-width:360px; height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.08),transparent);
}

.note {
  max-width:320px; text-align:center;
  font-size:14px; line-height:1.75;
  color:rgba(255,255,255,0.28); font-style:italic;
}

.hint { font-size:11px; color:rgba(255,255,255,0.15); letter-spacing:0.05em; text-align:center; margin-top:-0.5rem; }
</style>
</head>
<body>

<canvas id="bg"></canvas>
<canvas id="hearts"></canvas>

<div class="page">
  <p class="eyebrow">nosso amor</p>
  <div class="orb-scene">
    <div class="trail"></div>
    <div class="trail"></div>
    <div class="trail"></div>
    <div class="orb" id="orb" onclick="burstOrb(event)">❤️</div>
  </div>
  <div class="count-block">
    <span class="count-num" id="months">0</span>
    <div class="count-unit" id="count-unit">meses juntos</div>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-num" id="years">0</div><div class="stat-lbl">anos</div></div>
    <div class="stat"><div class="stat-num" id="days">0</div><div class="stat-lbl">dias</div></div>
    <div class="stat"><div class="stat-num" id="hours">0</div><div class="stat-lbl">horas</div></div>
  </div>
  <p class="since">juntos desde 29 de novembro de 2025</p>
  <div class="aniv" id="aniv"></div>
  <div class="divider"></div>
  <p class="note" id="note"></p>
  <p class="hint">toque nos corações ❤️</p>
</div>

<script>
// ── CONTAGEM ─────────────────────────────────────────────
const START = new Date('2025-11-29T00:00:00');
const notes = [
  "o amor não se mede em meses, mas cada um conta muito.",
  "cada dia ao seu lado é uma história nova.",
  "tempo junto é o melhor investimento que existe.",
  "a vida fica mais bonita quando você escolhe ficar.",
  "um mês de cada vez, construindo algo que dura.",
  "você é o lar que eu escolho todos os dias.",
  "alguns encontros mudam tudo. o nosso mudou."
];
function update() {
  const now = new Date();
  const diffMs = now - START;
  const totalDays = Math.floor(diffMs/86400000);
  const totalHours = Math.floor(diffMs/3600000);
  let months = (now.getFullYear()-START.getFullYear())*12+(now.getMonth()-START.getMonth());
  if (now.getDate()<START.getDate()) months--;
  if (months<0) months=0;
  document.getElementById('months').textContent = months;
  document.getElementById('count-unit').textContent = months===1?'mês juntos':'meses juntos';
  document.getElementById('years').textContent = Math.floor(months/12);
  document.getElementById('days').textContent = totalDays.toLocaleString('pt-BR');
  document.getElementById('hours').textContent = totalHours.toLocaleString('pt-BR');
  document.getElementById('note').textContent = notes[months%notes.length];
  const nextAniv = new Date(START);
  nextAniv.setMonth(START.getMonth()+months+1);
  const diffAniv = Math.ceil((nextAniv-now)/86400000);
  const el = document.getElementById('aniv');
  if (diffAniv<=0){ el.textContent='🎉 hoje é mesversário!'; el.className='aniv hoje'; }
  else if (diffAniv===1){ el.textContent='💜 amanhã é mesversário!'; el.className='aniv hoje'; }
  else { el.textContent='próximo mesversário em '+diffAniv+' dias'; el.className='aniv'; }
}
update(); setInterval(update,30000);

// ── NEBULOSA ──────────────────────────────────────────────
const bgC = document.getElementById('bg');
const bgX = bgC.getContext('2d');
let W,H,stars=[],bgTime=0;
function resize(){
  W=bgC.width=window.innerWidth; H=bgC.height=window.innerHeight;
  stars=Array.from({length:90},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.2+0.2,o:Math.random()*0.6+0.1,speed:Math.random()*0.003+0.001,phase:Math.random()*Math.PI*2}));
}
resize(); window.addEventListener('resize',resize);

function drawBg(){
  bgX.clearRect(0,0,W,H);
  const t=bgTime*0.0004;
  const g1=bgX.createRadialGradient(W*0.3+Math.sin(t)*40,H*0.3+Math.cos(t*0.7)*30,0,W*0.3,H*0.3,W*0.55);
  g1.addColorStop(0,'rgba(139,92,246,0.18)'); g1.addColorStop(1,'transparent');
  bgX.fillStyle=g1; bgX.fillRect(0,0,W,H);
  const g2=bgX.createRadialGradient(W*0.72+Math.cos(t*0.9)*35,H*0.6+Math.sin(t)*25,0,W*0.72,H*0.6,W*0.5);
  g2.addColorStop(0,'rgba(244,63,142,0.14)'); g2.addColorStop(1,'transparent');
  bgX.fillStyle=g2; bgX.fillRect(0,0,W,H);
  const g3=bgX.createRadialGradient(W*0.5+Math.sin(t*1.1)*20,H*0.8,0,W*0.5,H*0.8,W*0.4);
  g3.addColorStop(0,'rgba(59,130,246,0.1)'); g3.addColorStop(1,'transparent');
  bgX.fillStyle=g3; bgX.fillRect(0,0,W,H);
  stars.forEach(s=>{
    const pulse=Math.sin(bgTime*s.speed+s.phase)*0.3+0.7;
    bgX.beginPath(); bgX.arc(s.x,s.y,s.r,0,Math.PI*2);
    bgX.fillStyle=`rgba(255,255,255,${s.o*pulse})`; bgX.fill();
  });
  bgTime++;
}

// ── CORAÇÕES NO CANVAS ────────────────────────────────────
const hC = document.getElementById('hearts');
const hX = hC.getContext('2d');

const GLYPHS = ['❤️','💜','💗','💖','🩷','💓'];

// cada coração tem posição, velocidade, rotação, oscilação própria
const floatingHearts = Array.from({length:14}, (_, i) => ({
  x: Math.random() * (window.innerWidth || 390),
  y: Math.random() * (window.innerHeight || 844),
  vx: 0,
  vxBase: (Math.random() < 0.5 ? 1 : -1) * (Math.random()*0.35+0.2), // direção aleatória, velocidade constante
  vy: -(Math.random()*0.6+0.2),        // sobe levemente
  size: 18 + Math.random()*16,
  glyph: GLYPHS[Math.floor(Math.random()*GLYPHS.length)],
  alpha: 0.6 + Math.random()*0.35,
  wobbleAmp: 1.2 + Math.random()*1.8,  // amplitude de oscilação lateral
  wobbleFreq: 0.02 + Math.random()*0.03,
  wobblePhase: Math.random()*Math.PI*2,
  rotSpeed: (Math.random()-0.5)*0.04,
  rot: Math.random()*Math.PI*2,
  t: 0,
}));

// para detectar toque/clique nos corações do canvas
hC.style.pointerEvents = 'auto';

function heartAt(px, py) {
  // retorna o coração mais próximo do ponto clicado, dentro de margem
  let best = null, bestDist = 999;
  floatingHearts.forEach(h => {
    const dx = h.x - px, dy = h.y - py;
    const dist = Math.sqrt(dx*dx+dy*dy);
    if (dist < h.size*1.1 && dist < bestDist) { best=h; bestDist=dist; }
  });
  return best;
}

function onHeartClick(ev) {
  const rect = hC.getBoundingClientRect();
  const px = (ev.clientX||ev.touches[0].clientX) - rect.left;
  const py = (ev.clientY||ev.touches[0].clientY) - rect.top;
  const h = heartAt(px, py);
  if (h) {
    showElogio(px, py);
    playChime();
    // impulso ao toque
    h.vx += (Math.random()-0.5)*3;
    h.vy -= 2 + Math.random()*2;
  }
}
hC.addEventListener('click', onHeartClick);
hC.addEventListener('touchstart', e => { e.preventDefault(); onHeartClick(e); }, {passive:false});

function resizeHearts(){
  hC.width = window.innerWidth;
  hC.height = window.innerHeight;
}
resizeHearts();
window.addEventListener('resize', () => { resize(); resizeHearts(); });

function drawHearts(){
  hC.width = hC.width; // clear
  floatingHearts.forEach(h => {
    h.t++;
    // oscilação senoidal lateral
    h.x += h.vxBase + h.vx + Math.sin(h.t * h.wobbleFreq + h.wobblePhase) * h.wobbleAmp * 0.12;
    h.y += h.vy;
    h.rot += h.rotSpeed;
    // atrito suave na velocidade extra do toque
    h.vx *= 0.97;
    h.vy = h.vy * 0.97 + (-(0.3+Math.random()*0.1))*0.03; // mantém subida leve

    // wrap: sai por qualquer borda e reaparece no lado oposto
    const pad = h.size * 1.5;
    if (h.x < -pad)  h.x = hC.width + pad;
    if (h.x > hC.width + pad)  h.x = -pad;
    if (h.y < -pad)  { h.y = hC.height + pad; h.x = Math.random()*hC.width; }
    if (h.y > hC.height + pad) { h.y = -pad;  h.x = Math.random()*hC.width; }

    hX.save();
    hX.translate(h.x, h.y);
    hX.rotate(h.rot);
    hX.globalAlpha = h.alpha;
    hX.font = `${h.size}px serif`;
    hX.textAlign = 'center';
    hX.textBaseline = 'middle';
    hX.fillText(h.glyph, 0, 0);
    hX.restore();
  });
}

// ── LOOP PRINCIPAL ────────────────────────────────────────
function loop(){
  drawBg();
  drawHearts();
  requestAnimationFrame(loop);
}
loop();

// ── ELOGIOS ───────────────────────────────────────────────
const elogios = [
  { emoji:'💗', text:'Eu te amo cada dia mais.' },
  { emoji:'🌍', text:'Eu sempre te escolheria entre os 8,3 bilhões de pessoas do mundo.' },
  { emoji:'🌸', text:'O seu sorriso é o mais lindo que já vi.' },
  { emoji:'💓', text:'Eu te amo a cada momento.' },
  { emoji:'⏱️', text:'Eu te amo a cada segundo.' },
  { emoji:'👑', text:'Você é a minha princesa.' },
  { emoji:'🥰', text:'Você é o meu amorzinho.' },
  { emoji:'🙏', text:'Você é a mulher das minhas orações.' },
  { emoji:'✨', text:'Quero estar com você em todos os melhores momentos da minha vida.' },
  { emoji:'🌙', text:'Minha parte favorita do dia é quando estou com você.' },
  { emoji:'🦋', text:'Você tem uma leveza que me deixa sem palavras.' },
  { emoji:'⭐', text:'Você brilha, mesmo quando não percebe.' },
  { emoji:'💫', text:'Você é o motivo pelo qual eu acordo sorrindo.' },
  { emoji:'🌹', text:'Cada detalhe seu me encanta mais do que o anterior.' },
  { emoji:'💝', text:'Amo a pessoa que você é, sem precisar mudar nada.' },
];

let lastElogio = -1;
function getElogio(){ let i; do{i=Math.floor(Math.random()*elogios.length);}while(i===lastElogio); lastElogio=i; return elogios[i]; }

function showElogio(x,y){
  const e=getElogio();
  const div=document.createElement('div');
  div.className='elogio-popup';
  div.innerHTML=`<div class="elogio-inner"><span class="elogio-emoji">${e.emoji}</span><span class="elogio-text">${e.text}</span></div>`;
  div.style.left=Math.min(x-120, window.innerWidth-250)+'px';
  div.style.top=(y-20)+'px';
  document.body.appendChild(div);
  setTimeout(()=>div.remove(),2700);
}

// ── BURST NO ORB ──────────────────────────────────────────
const burstEmojis=['❤️','💜','💗','✨','🌸','💖','⭐'];
function burstOrb(ev){
  const rect=document.getElementById('orb').getBoundingClientRect();
  const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
  for(let i=0;i<12;i++){
    const el=document.createElement('span');
    el.textContent=burstEmojis[Math.floor(Math.random()*burstEmojis.length)];
    const angle=(Math.PI*2/12)*i+Math.random()*0.5;
    const dist=70+Math.random()*90;
    const tx=Math.cos(angle)*dist, ty=Math.sin(angle)*dist-40;
    el.style.cssText=`position:fixed;left:${cx}px;top:${cy}px;font-size:${14+Math.random()*16}px;pointer-events:none;z-index:999;transform:translate(-50%,-50%) scale(1);transition:transform 0.85s cubic-bezier(.2,.8,.4,1),opacity 0.85s ease-out;`;
    document.body.appendChild(el);
    requestAnimationFrame(()=>{ el.style.transform=`translate(calc(-50% + ${tx}px),calc(-50% + ${ty}px)) scale(0.5)`; el.style.opacity='0'; });
    setTimeout(()=>el.remove(),900);
  }
  showElogio(cx, cy-80);
  playChime();
}

// ── SOM ───────────────────────────────────────────────────
function playChime(){
  try{
    const ac=new (window.AudioContext||window.webkitAudioContext)();
    [523.25,659.25,783.99].forEach((f,i)=>{
      const o=ac.createOscillator(),g=ac.createGain();
      o.type='sine'; o.frequency.value=f;
      g.gain.setValueAtTime(0,ac.currentTime+i*0.09);
      g.gain.linearRampToValueAtTime(0.06,ac.currentTime+i*0.09+0.04);
      g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+i*0.09+0.32);
      o.connect(g); g.connect(ac.destination);
      o.start(ac.currentTime+i*0.09); o.stop(ac.currentTime+i*0.09+0.35);
    });
    setTimeout(()=>ac.close(),1500);
  }catch(e){}
}
</script>
</body>
</html>
